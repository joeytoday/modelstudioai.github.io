<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} - {{ site.title }}</title>
<style>
:root {
  --primary: #1a73e8;
  --primary-dark: #1557b0;
  --bg: #ffffff;
  --bg-sidebar: #f8f9fa;
  --text: #202124;
  --text-secondary: #5f6368;
  --border: #e8eaed;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif; color: var(--text); line-height: 1.7; }

/* Nav */
.nav { background: var(--bg); border-bottom: 1px solid var(--border); padding: 14px 0; position: sticky; top: 0; z-index: 100; }
.nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { font-size: 17px; font-weight: 700; color: var(--text); text-decoration: none; }
.nav-links { display: flex; gap: 20px; }
.nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; }
.nav-links a:hover { color: var(--primary); }

/* Layout */
.doc-layout { display: flex; max-width: 1200px; margin: 0 auto; min-height: calc(100vh - 53px); }

/* Sidebar */
.sidebar { width: 240px; flex-shrink: 0; background: var(--bg-sidebar); border-right: 1px solid var(--border); padding: 24px 16px; position: sticky; top: 53px; height: calc(100vh - 53px); overflow-y: auto; }
.sidebar h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 8px; margin-top: 20px; }
.sidebar h4:first-child { margin-top: 0; }
.sidebar a { display: block; padding: 6px 12px; color: var(--text-secondary); text-decoration: none; font-size: 14px; border-radius: 6px; margin-bottom: 2px; }
.sidebar a:hover { background: var(--border); color: var(--text); }
.sidebar a.active { background: #e8f0fe; color: var(--primary); font-weight: 600; }

/* Content */
.doc-content { flex: 1; padding: 32px 48px; max-width: 820px; }
.doc-content h1 { font-size: 28px; margin-bottom: 8px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.doc-content h2 { font-size: 22px; margin-top: 40px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.doc-content h3 { font-size: 17px; margin-top: 28px; margin-bottom: 8px; }
.doc-content p { margin-bottom: 16px; font-size: 15px; }
.doc-content ul, .doc-content ol { margin-bottom: 16px; padding-left: 24px; font-size: 15px; }
.doc-content li { margin-bottom: 6px; }
.doc-content a { color: var(--primary); text-decoration: none; }
.doc-content a:hover { text-decoration: underline; }
.doc-content code { background: #f1f3f4; padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: "SF Mono", "Fira Code", monospace; }
.doc-content pre { background: #1e1e1e; color: #d4d4d4; padding: 16px 20px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; font-size: 13px; line-height: 1.5; }
.doc-content pre code { background: none; padding: 0; color: inherit; }
.doc-content table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 14px; }
.doc-content th, .doc-content td { padding: 10px 12px; border: 1px solid var(--border); text-align: left; }
.doc-content th { background: var(--bg-sidebar); font-weight: 600; }
.doc-content blockquote { border-left: 3px solid var(--primary); padding: 8px 16px; margin-bottom: 16px; background: #f0f4ff; color: var(--text-secondary); font-size: 14px; border-radius: 0 6px 6px 0; }
.doc-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

/* Edit link */
.edit-link { margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); }
.edit-link a { color: var(--primary); }

/* Mobile */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .doc-content { padding: 24px 16px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Model Studio AI</a>
    <div class="nav-links">
      <a href="/guide/">教程</a>
      <a href="/skills/">Skills</a>
      <a href="/workshop/">Workshop</a>
      <a href="/showcase/">案例</a>
      <a href="https://github.com/ModelStudioAI" target="_blank">GitHub</a>
    </div>
  </div>
</nav>

<div class="doc-layout">
  <aside class="sidebar">
    <h4>快速开始</h4>
    <a href="/guide/" {% if page.url == '/guide/' %}class="active"{% endif %}>完整教程</a>
    <a href="/workshop/" {% if page.url == '/workshop/' %}class="active"{% endif %}>Workshop 手册</a>

    <h4>产品</h4>
    <a href="/cli/" {% if page.url == '/cli/' %}class="active"{% endif %}>阿里云百炼 CLI</a>
    <a href="/openwork/" {% if page.url == '/openwork/' %}class="active"{% endif %}>OpenWork</a>
    <a href="/skills/" {% if page.url == '/skills/' %}class="active"{% endif %}>精选 Skills</a>

    <h4>社区</h4>
    <a href="/showcase/" {% if page.url == '/showcase/' %}class="active"{% endif %}>用户案例</a>
    <a href="/videos/" {% if page.url == '/videos/' %}class="active"{% endif %}>视频教程</a>
    <a href="/faq/" {% if page.url == '/faq/' %}class="active"{% endif %}>FAQ</a>

    <h4>链接</h4>
    <a href="{{ site.bailian_apikey_url }}" target="_blank">获取 API Key</a>
    <a href="{{ site.bailian_cli_url }}" target="_blank">阿里云百炼控制台</a>
    <a href="https://github.com/ModelStudioAI" target="_blank">GitHub</a>
  </aside>

  <main class="doc-content">
    {{ content }}

    <div class="edit-link">
      <a href="https://github.com/ModelStudioAI/modelstudioai.github.io/edit/main/{{ page.path }}" target="_blank">在 GitHub 上编辑此页</a>
    </div>
  </main>
</div>

</body>
</html>
